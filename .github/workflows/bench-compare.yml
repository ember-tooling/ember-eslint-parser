name: Benchmark Comparison

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: bench-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  bench-compare:
    name: "Benchmark Comparison"
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    env:
      BENCH_JSON_OUTPUT: ${{ runner.temp }}/bench-results.json

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the script can checkout main for baseline benchmarks.
          fetch-depth: 0
          # Check out as a named branch (not detached HEAD) so the script can
          # read the branch name and restore it after switching to main.
          ref: ${{ github.head_ref }}

      - uses: wyvox/action-setup-pnpm@v3

      - name: Run benchmark comparison
        # Strip ANSI color codes so the output is readable in a PR comment.
        # Write to RUNNER_TEMP (outside the repo) so the file is not seen as an
        # untracked change by git — bench-compare.mjs stashes untracked files
        # before switching branches, which would stash (and later restore) an
        # empty copy of the file, discarding the real content.
        run: |
          set -o pipefail
          pnpm bench:compare 2>&1 | sed 's/\x1b\[[0-9;]*m//g' > "$RUNNER_TEMP/bench-output.txt"

      - name: Post PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- bench-compare -->';

            let rawOutput;
            try {
              rawOutput = fs.readFileSync(process.env.RUNNER_TEMP + '/bench-output.txt', 'utf8').trim();
            } catch {
              rawOutput = '(no output — benchmark may have failed to start)';
            }

            let benchData = null;
            try {
              benchData = JSON.parse(fs.readFileSync(process.env.BENCH_JSON_OUTPUT, 'utf8'));
            } catch { /* JSON not available — fall back to raw output */ }

            const success = ${{ job.status == 'success' }};
            const heading = success
              ? '## 🏎️ Benchmark Comparison'
              : '## ❌ Benchmark Comparison (failed)';

            let body;
            if (benchData) {
              const { branch, base, results } = benchData;

              function fmtHz(n) {
                return n.toLocaleString('en-US', { maximumFractionDigits: 2 });
              }

              function fmtDelta(r) {
                if (r.note) return r.note;
                const num = parseFloat(r.delta);
                const emoji = num >= 5 ? '🟢 ' : num <= -5 ? '🔴 ' : '🟡 ';
                return emoji + r.delta;
              }

              // Delta-only table (shown in main comment)
              const deltaHeader = `| Benchmark | Δ |`;
              const deltaSep    = `|-----------|---|`;
              const deltaRows = results.map(r =>
                `| ${r.key} | ${fmtDelta(r)} |`
              ).join('\n');

              // Full table (hidden in <details>)
              const fullHeader = `| Benchmark | ${base} (hz) | ${branch} (hz) | Δ |`;
              const fullSep    = `|-----------|-------------|----------------|---|`;
              const fullRows = results.map(r => {
                const b = r.baseHz !== null ? fmtHz(r.baseHz) : '-';
                const c = r.currentHz !== null ? fmtHz(r.currentHz) : '-';
                return `| ${r.key} | ${b} | ${c} | ${fmtDelta(r)} |`;
              }).join('\n');

              const legend = '🟢 ≥ +5% faster &nbsp; 🔴 ≤ −5% slower &nbsp; 🟡 within ±5% similar';

              body = [
                marker,
                heading,
                '',
                deltaHeader,
                deltaSep,
                deltaRows,
                '',
                legend,
                '',
                '<details>',
                `<summary>Full results (${base} vs ${branch})</summary>`,
                '',
                fullHeader,
                fullSep,
                fullRows,
                '',
                '</details>',
              ].join('\n');
            } else {
              body = `${marker}\n${heading}\n\n\`\`\`\n${rawOutput}\n\`\`\``;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
